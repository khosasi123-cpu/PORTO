services:

  qdrant:
    image: qdrant/qdrant:v1.15.3
    container_name: qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - ./qdrant_storage:/qdrant/storage

    networks:
      - knowledge-network

  vllm:
    image: vllm/vllm-openai:nightly
    container_name: vllm
    restart: unless-stopped

    ports:
      - "8000:8000"

    gpus: all

    volumes:
      - ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface

    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}

    command: >
      --model Qwen/Qwen3.5-4B
      --host 0.0.0.0
      --port 8000
      --api-key ${OPENAI_API_KEY}
      --gpu-memory-utilization 0.90
      --max-model-len 8192
      --max-num-seqs 64

    networks:
      - knowledge-network


  fastapi:
    image: knowledgeops:v.0
    container_name: knowledgeops-api
    restart: unless-stopped

    depends_on:
      - qdrant
      - vllm

    ports:
      - "8080:8000"

    env_file:
      - .env.docker

    networks:
      - knowledge-network


networks:
  knowledge-network:
    driver: bridge